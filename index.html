          };

          // --- Sub Components ---
          const Flashcards = () => {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            const nextCard = () => {
              setIsFlipped(false);
              setCurrentIndex((prev) => (prev + 1) % vocabulary.length);
            };

            const prevCard = () => {
              setIsFlipped(false);
              setCurrentIndex((prev) => (prev - 1 + vocabulary.length) % vocabulary.length);
            };

            return (
              <div className="flex flex-col items-center justify-center p-6 bg-blue-50 rounded-xl shadow-sm">
                <div className="w-full max-w-md h-64 perspective-1000 cursor-pointer" onClick={() => setIsFlipped(!isFlipped)}>
                  <div className={`relative w-full h-full transition-transform duration-500 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`}>
                    {/* Front */}
                    <div className={`absolute w-full h-full bg-white rounded-2xl shadow-lg flex flex-col items-center justify-center backface-hidden border-2 border-blue-200 ${isFlipped ? 'opacity-0' : 'opacity-100'}`}>
                      <h3 className="text-gray-500 text-lg font-medium mb-2">Xitoycha</h3>
                      <div className="flex items-center gap-3">
                        <div className="text-6xl font-bold text-blue-600 mb-4">{vocabulary[currentIndex].hanzi}</div>
                        <button 
                          onClick={(e) => {
                            e.stopPropagation();
                            handlePlayAudio(vocabulary[currentIndex].hanzi);
                          }}
                          className="p-2 bg-blue-100 rounded-full text-blue-600 hover:bg-blue-200 transition mb-4"
                          title="Tinglash"
                        >
                          <Volume2 size={24} />
                        </button>
                      </div>
                      <div className="text-gray-400 text-sm">(Bosing va ma'nosini ko'ring)</div>
                    </div>
                    {/* Back */}
                    <div className={`absolute w-full h-full bg-blue-600 text-white rounded-2xl shadow-lg flex flex-col items-center justify-center backface-hidden rotate-y-180 ${isFlipped ? 'opacity-100' : 'opacity-0'}`}>
                      <h3 className="text-blue-200 text-lg font-medium mb-2">Pinyin & O'zbekcha</h3>
                      <div className="text-3xl font-bold mb-2">{vocabulary[currentIndex].pinyin}</div>
                      <div className="text-2xl font-semibold text-center px-4">{vocabulary[currentIndex].uzbek}</div>
                    </div>
                  </div>
                </div>

                <div className="flex space-x-8 mt-8">
                  <button onClick={prevCard} className="p-3 bg-white rounded-full shadow hover:bg-gray-100 text-blue-600">
                    <ChevronLeft size={24} />
                  </button>
                  <div className="flex items-center text-gray-600 font-medium">
                    {currentIndex + 1} / {vocabulary.length}
                  </div>
                  <button onClick={nextCard} className="p-3 bg-white rounded-full shadow hover:bg-gray-100 text-blue-600">
                    <ChevronRight size={24} />
                  </button>
                </div>
              </div>
            );
          };

          const Quiz = () => {
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [score, setScore] = useState(0);
            const [showScore, setShowScore] = useState(false);
            const [selectedOption, setSelectedOption] = useState(null);
            const [isCorrect, setIsCorrect] = useState(null);

            const handleOptionClick = (index) => {
              if (selectedOption !== null) return;
              setSelectedOption(index);
              
              if (index === quizQuestions[currentQuestion].answer) {
                setScore(score + 1);
                setIsCorrect(true);
              } else {
                setIsCorrect(false);
              }
            };

            const nextQuestion = () => {
              setSelectedOption(null);
              setIsCorrect(null);
              const nextQ = currentQuestion + 1;
              if (nextQ < quizQuestions.length) {
                setCurrentQuestion(nextQ);
              } else {
                setShowScore(true);
              }
            };

            const resetQuiz = () => {
              setCurrentQuestion(0);
              setScore(0);
              setShowScore(false);
              setSelectedOption(null);
              setIsCorrect(null);
            };

            return (
              <div className="max-w-2xl mx-auto p-4">
                <div className="mb-4 text-center">
                    <h2 className="text-xl font-bold text-blue-800">Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz</h2>
                    <p className="text-gray-500 text-sm">Test 15 ta savoldan iborat</p>
                </div>
                {showScore ? (
                  <div className="text-center bg-white p-8 rounded-xl shadow-lg border border-blue-100">
                    <h2 className="text-2xl font-bold text-gray-800 mb-4">Natija</h2>
                    <div className="text-5xl font-bold text-blue-600 mb-4">
                      {score} / {quizQuestions.length}
                    </div>
                    <p className="text-gray-600 mb-6">
                      {score > 12 ? "Ajoyib natija! 🎉" : score > 8 ? "Yaxshi, lekin yana mashq qiling. 👍" : "Qayta urinib ko'ring. 💪"}
                    </p>
                    <button onClick={resetQuiz} className="flex items-center justify-center w-full px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                      <RefreshCw className="mr-2" size={20} /> Qayta boshlash
                    </button>
                  </div>
                ) : (
                  <div className="bg-white p-6 rounded-xl shadow-md border border-gray-100">
                    <div className="flex justify-between items-center mb-6">
                      <span className="text-sm font-semibold text-gray-500">Savol {currentQuestion + 1}/{quizQuestions.length}</span>
                      <span className="text-sm font-bold text-blue-600">Ball: {score}</span>
                    </div>
                    <h3 className="text-xl font-semibold text-gray-800 mb-6">{quizQuestions[currentQuestion].question}</h3>
                    <div className="space-y-3">
                      {quizQuestions[currentQuestion].options.map((option, index) => (
                        <button
                          key={index}
                          onClick={() => handleOptionClick(index)}
                          className={`w-full text-left p-4 rounded-lg border transition-all ${
                            selectedOption === null 
                              ? 'hover:bg-blue-50 border-gray-200' 
                              : index === quizQuestions[currentQuestion].answer 
                                ? 'bg-green-100 border-green-500 text-green-800'
                                : selectedOption === index 
                                  ? 'bg-red-100 border-red-500 text-red-800'
                                  : 'bg-gray-50 border-gray-200 opacity-50'
                          }`}
                          disabled={selectedOption !== null}
                        >
                          <div className="flex items-center justify-between">
                            <span>{option}</span>
                            {selectedOption !== null && index === quizQuestions[currentQuestion].answer && <CheckCircle size={20} className="text-green-600" />}
                            {selectedOption === index && index !== quizQuestions[currentQuestion].answer && <XCircle size={20} className="text-red-600" />}
                          </div>
                        </button>
                      ))}
                    </div>
                    {selectedOption !== null && (
                      <button onClick={nextQuestion} className="mt-6 w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">
                        {currentQuestion === quizQuestions.length - 1 ? "Natijani ko'rish" : "Keyingi savol"}
                      </button>
                    )}
                  </div>
                )}
              </div>
            );
          };

          // --- Render ---
          return (
            <div className="min-h-screen bg-gray-50 font-sans flex flex-col">
              {/* Header */}
              <header className="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-6 shadow-lg">
                <div className="max-w-4xl mx-auto text-center">
                  <div className="text-blue-200 font-medium mb-2 text-sm md:text-base">Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz</div>
                  <h1 className="text-3xl font-bold mb-2">{lessonTitle}</h1>
                  <p className="text-blue-100 text-lg">{lessonSubtitle}</p>
                </div>
              </header>

              {/* Navigation */}
              <nav className="bg-white shadow-sm sticky top-0 z-10 overflow-x-auto">
                <div className="max-w-4xl mx-auto flex justify-around p-2 min-w-max">
                  <button 
                    onClick={() => setActiveTab('home')} 
                    className={`flex items-center space-x-2 px-4 py-2 rounded-lg transition ${activeTab === 'home' ? 'bg-blue-100 text-blue-700' : 'text-gray-600 hover:bg-gray-100'}`}
                  >
                    <Home size={20} /> <span>Bosh sahifa</span>
                  </button>
                  <button 
                    onClick={() => setActiveTab('vocab')} 
                    className={`flex items-center space-x-2 px-4 py-2 rounded-lg transition ${activeTab === 'vocab' ? 'bg-blue-100 text-blue-700' : 'text-gray-600 hover:bg-gray-100'}`}
                  >
                    <BookOpen size={20} /> <span>Lug'at</span>
                  </button>
                  <button 
                    onClick={() => setActiveTab('dialogue')} 
                    className={`flex items-center space-x-2 px-4 py-2 rounded-lg transition ${activeTab === 'dialogue' ? 'bg-blue-100 text-blue-700' : 'text-gray-600 hover:bg-gray-100'}`}
                  >
                    <MessageCircle size={20} /> <span>Muloqot</span>
                  </button>
                  <button 
                    onClick={() => setActiveTab('grammar')} 
                    className={`flex items-center space-x-2 px-4 py-2 rounded-lg transition ${activeTab === 'grammar' ? 'bg-blue-100 text-blue-700' : 'text-gray-600 hover:bg-gray-100'}`}
                  >
                    <GraduationCap size={20} /> <span>Grammatika</span>
                  </button>
                  <button 
                    onClick={() => setActiveTab('quiz')} 
                    className={`flex items-center space-x-2 px-4 py-2 rounded-lg transition ${activeTab === 'quiz' ? 'bg-blue-100 text-blue-700' : 'text-gray-600 hover:bg-gray-100'}`}
                  >
                    <PlayCircle size={20} /> <span>Test</span>
                  </button>
                </div>
              </nav>

              {/* Main Content */}
              <main className="flex-grow max-w-4xl mx-auto w-full p-4 md:p-6">
                
                {activeTab === 'home' && (
                  <div className="text-center space-y-8 animate-fade-in">
                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-blue-50">
                      <h2 className="text-2xl font-bold text-gray-800 mb-4">Xush kelibsiz!</h2>
                      <p className="text-gray-600 mb-6">HSK 3-daraja 5-dars interaktiv o'quv dasturiga xush kelibsiz. Ushbu dars orqali siz "borgan sari" (越来越) grammatikasi va holat o'zgarishi haqida o'rganasiz.</p>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div onClick={() => setActiveTab('vocab')} className="cursor-pointer bg-green-50 p-4 rounded-xl hover:shadow-md transition border border-green-100">
                          <h3 className="font-bold text-green-700 text-lg">📝 13 Yangi so'z</h3>
                          <p className="text-sm text-green-600">Yangi so'zlarni o'rganing</p>
                        </div>
                        <div onClick={() => setActiveTab('dialogue')} className="cursor-pointer bg-purple-50 p-4 rounded-xl hover:shadow-md transition border border-purple-100">
                          <h3 className="font-bold text-purple-700 text-lg">🗣️ 4 ta Dialog</h3>
                          <p className="text-sm text-purple-600">Muloqotni mashq qiling</p>
                        </div>
                        <div onClick={() => setActiveTab('grammar')} className="cursor-pointer bg-orange-50 p-4 rounded-xl hover:shadow-md transition border border-orange-100">
                          <h3 className="font-bold text-orange-700 text-lg">📚 Grammatika</h3>
                          <p className="text-sm text-orange-600">"了" va "越来越"</p>
                        </div>
                        <div onClick={() => setActiveTab('quiz')} className="cursor-pointer bg-red-50 p-4 rounded-xl hover:shadow-md transition border border-red-100">
                          <h3 className="font-bold text-red-700 text-lg">✅ 15 ta Savol</h3>
                          <p className="text-sm text-red-600">Bilimingizni sinang</p>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'vocab' && (
                  <div className="space-y-6">
                    <h2 className="text-2xl font-bold text-gray-800 text-center mb-4">生词闪卡 (Yangi so'zlar)</h2>
                    <Flashcards />
                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 mt-8">
                      {vocabulary.map((word) => (
                        <div key={word.id} className="bg-white p-3 rounded-lg shadow-sm border border-gray-100 flex flex-col items-center">
                          <div className="flex items-center gap-2">
                            <span className="text-xl font-bold text-blue-600">{word.hanzi}</span>
                            <button 
                              onClick={() => handlePlayAudio(word.hanzi)}
                              className="p-1 text-blue-400 hover:text-blue-600 transition"
                              title="Tinglash"
                            >
                              <Volume2 size={16} />
                            </button>
                          </div>
                          <span className="text-sm text-gray-500">{word.pinyin}</span>
                          <span className="text-sm font-medium text-gray-700 text-center mt-1">{word.uzbek}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {activeTab === 'dialogue' && (
                  <div className="space-y-8">
                     <h2 className="text-2xl font-bold text-gray-800 text-center mb-4">课文 (Matnlar)</h2>
                    {dialogues.map((dialogue) => (
                      <div key={dialogue.id} className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <div className="bg-blue-50 p-4 border-b border-blue-100">
                          <h3 className="font-bold text-lg text-blue-800">{dialogue.title}</h3>
                        </div>
                        <div className="p-4 space-y-4">
                          {dialogue.roles.map((role, idx) => (
                            <div key={idx} className="flex flex-col sm:flex-row gap-2 sm:gap-4 pb-4 border-b border-gray-50 last:border-0">
                              <div className="sm:w-16 font-bold text-gray-700 flex-shrink-0">{role.name}:</div>
                              <div className="flex-grow">
                                <div className="flex items-start gap-2">
                                    <p className="text-lg font-medium text-gray-900 mb-1">{role.text}</p>
                                    <button 
                                        onClick={() => handlePlayAudio(role.text)}
                                        className="mt-1 p-1 text-blue-400 hover:text-blue-600 transition flex-shrink-0"
                                        title="Tinglash"
                                    >
                                        <Volume2 size={18} />
                                    </button>
                                </div>
                                <p className="text-sm text-blue-600 mb-2">{role.pinyin}</p>
                                <div className="space-y-1">
                                    <p className="text-sm text-gray-600 italic">🇺🇿 {role.trans}</p>
                                    <p className="text-sm text-gray-600 italic">🇷🇺 {role.ru}</p>
                                    <p className="text-sm text-gray-600 italic">🇬🇧 {role.en}</p>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {activeTab === 'grammar' && (
                  <div className="space-y-6">
                    <h2 className="text-2xl font-bold text-gray-800 text-center mb-4">语法 (Grammatika)</h2>
                    {grammarPoints.map((point, idx) => (
                      <div key={idx} className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                        <h3 className="text-xl font-bold text-blue-700 mb-3">{point.title}</h3>
                        <div className="space-y-2 mb-4">
                            <p className="text-gray-700 leading-relaxed"><span className="font-bold text-blue-600 text-xs uppercase mr-2">UZ</span>{point.explanation.uz}</p>
                            <p className="text-gray-700 leading-relaxed"><span className="font-bold text-red-600 text-xs uppercase mr-2">RU</span>{point.explanation.ru}</p>
                            <p className="text-gray-700 leading-relaxed"><span className="font-bold text-green-600 text-xs uppercase mr-2">EN</span>{point.explanation.en}</p>
                        </div>

                        <div className="bg-gray-50 p-4 rounded-lg">
                          <h4 className="font-semibold text-gray-600 mb-2">Misollar / Примеры / Examples:</h4>
                          <ul className="space-y-4">
                            {point.examples.map((ex, i) => (
                              <li key={i} className="flex flex-col border-b border-gray-200 last:border-0 pb-2 last:pb-0">
                                <span className="font-medium text-lg text-gray-800">{ex.zh}</span>
                                <span className="text-sm text-gray-600 mt-1">🇺🇿 {ex.uz}</span>
                                <span className="text-sm text-gray-600">🇷🇺 {ex.ru}</span>
                                <span className="text-sm text-gray-600">🇬🇧 {ex.en}</span>
                              </li>
                            ))}
                          </ul>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {activeTab === 'quiz' && <Quiz />}

              </main>

              {/* Footer */}
              <footer className="bg-gray-800 text-gray-300 py-6 mt-12 text-center text-sm">
                <div className="max-w-4xl mx-auto px-4">
                    <p className="font-semibold text-white mb-1">HSK 3 Standard Course - Lesson 5</p>
                    <p>© 2026 Dilfuza Kāng lǎo shī (telegram@diffila)</p>
                </div>
              </footer>
            </div>
          );
        };

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HSKApp />);
    </script>
</body>
</html>
